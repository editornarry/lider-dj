<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/style.css">
<title>LÍDER DJ CINEMATIC</title>
</head>

<body>

<div class="app">

  <aside class="sidebar glass">
    <h2>LÍDER DJ</h2>

    <input type="file" id="fileInput">

    <button onclick="
      let f=fileInput.files[0];
      deckA.src=URL.createObjectURL(f);
      deckA.play();
      send('music', f.name);
    ">Play Deck A</button>

    <button onclick="
      let f=fileInput.files[0];
      deckB.src=URL.createObjectURL(f);
      deckB.play();
      send('music', f.name);
    ">Play Deck B</button>

    <button id="openScreen">Abrir Tela</button>

    <input id="msg" placeholder="Mensagem">
    <button id="sendMsg">Enviar</button>

    <label>Crossfade</label>
    <input type="range" id="cross" min="0" max="1" step="0.01">

    <label>Master</label>
    <input type="range" id="master" min="0" max="1" step="0.01" value="1">
  </aside>

  <main class="main">
    <audio id="deckA"></audio>
    <audio id="deckB"></audio>
    <canvas id="viz"></canvas>
  </main>

</div>

<script src="js/audio.js"></script>
<script src="js/comms.js"></script>
<script src="js/visuals.js"></script>
<script src="js/particles.js"></script>
<script src="js/app.js"></script>

</body>
</html>
